    description: >-
      Antero Resources Corporation (NYSE: AR) files annual reports (10-K),
      quarterly reports (10-Q), current reports (8-K), proxy statements, and
      other regulatory disclosures with the U.S. Securities and Exchange
      Commission. These filings are accessible via the SEC EDGAR full-text
      search API and the EDGAR data APIs for machine-readable financial data.
