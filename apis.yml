name: Antero Resources
description: >-
  Antero Resources is an independent oil and natural gas company engaged in
  the exploration, development, and production of natural gas, NGLs, and oil
  properties in the Appalachian Basin (West Virginia and Ohio). It is one of
  the largest natural gas producers in the United States, with operations
  focused on the Marcellus and Utica Shale formations.
